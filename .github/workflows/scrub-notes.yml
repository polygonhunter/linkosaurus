name: Update release notes
on: workflow_dispatch

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite release bodies
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit 3.5.0 --notes-file .github/scrub/3.5.0.md
          gh release edit 3.7.0 --notes-file .github/scrub/3.7.0.md
          gh release edit 3.7.1 --notes-file .github/scrub/3.7.1.md
